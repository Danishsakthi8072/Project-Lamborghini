<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Lamborghini</title>
    <link rel="stylesheet" href="Sign-Up.css">
    <script defer src="Sign-Up.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password" required autocomplete="new-password">
                </div>
                <button type="submit">Sign Up</button>
                <p class="signup-link">Already have an account? <a href="Sign-In.html">Sign In</a></p>
            </form>
        </div>
    </div>
</body>
</html>
