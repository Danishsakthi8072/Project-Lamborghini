<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lamborghini</title>
    <link rel="stylesheet" href="Sign-In.css">
    <script defer src="Sign-In.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Sign In</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="new-password">
                </div>
                <button type="submit">Login</button>
                <p class="signup-link">Don't have an account? <a href="Sign-Up.html">Sign Up</a></p>
            </form>
        </div>
    </div>
</body>
</html>
